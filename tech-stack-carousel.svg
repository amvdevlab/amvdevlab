<svg viewBox="0 0 3000 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .marquee { animation: scroll 40s linear infinite; }
    
    .text-item { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      font-size: 32px; 
      font-weight: 500;
      fill: #1a1a1a;
      text-anchor: middle;
      letter-spacing: -0.2px;
    }

    @keyframes scroll { 
      0% { transform: translateX(0); } 
      100% { transform: translateX(-3000px); } 
    }
    
    svg:hover .marquee { animation-play-state: paused; }
  </style>

  <g class="marquee">
    <g transform="translate(0, 60)">
      <text x="100" class="text-item">Python</text>
      <text x="300" class="text-item">Java</text>
      <text x="500" class="text-item">TypeScript</text>
      <text x="700" class="text-item">C++</text>
      <text x="900" class="text-item">Next.js</text>
      <text x="1100" class="text-item">Docker</text>
      <text x="1300" class="text-item">AWS</text>
      <text x="1500" class="text-item">Postman</text>
      <text x="1700" class="text-item">Cloudflare</text>
      <text x="1900" class="text-item">Pinecone</text>
      <text x="2100" class="text-item">LangChain</text>
      <text x="2300" class="text-item">PostgreSQL</text>
      <text x="2500" class="text-item">PyTorch</text>
      <text x="2700" class="text-item">Streamlit</text>
      <text x="2900" class="text-item">GitHub</text>
    </g>

    <g transform="translate(3000, 60)">
      <text x="100" class="text-item">Python</text>
      <text x="300" class="text-item">Java</text>
      <text x="500" class="text-item">TypeScript</text>
      <text x="700" class="text-item">C++</text>
      <text x="900" class="text-item">Next.js</text>
      <text x="1100" class="text-item">Docker</text>
      <text x="1300" class="text-item">AWS</text>
      <text x="1500" class="text-item">Postman</text>
      <text x="1700" class="text-item">Cloudflare</text>
      <text x="1900" class="text-item">Pinecone</text>
      <text x="2100" class="text-item">LangChain</text>
      <text x="2300" class="text-item">PostgreSQL</text>
      <text x="2500" class="text-item">PyTorch</text>
      <text x="2700" class="text-item">Streamlit</text>
      <text x="2900" class="text-item">GitHub</text>
    </g>
  </g>
</svg>

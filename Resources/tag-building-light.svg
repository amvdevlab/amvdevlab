<svg xmlns="http://www.w3.org/2000/svg" width="66" height="18" viewBox="0 0 66 18">
  <defs><style>
    .bg{fill:#E6F1FB}.bd{fill:none;stroke:#378ADD;stroke-width:0.5}.lb{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:10px;font-weight:500;fill:#0C447C}
    .dot{fill:#378ADD}.ring{fill:none;stroke:#378ADD;stroke-width:1.2;animation:ex 2.2s ease-out infinite}
    @keyframes ex{0%{r:2.8px;opacity:.6}100%{r:6px;opacity:0}}
  </style></defs>
  <rect x=".25" y=".25" width="65.5" height="17.5" rx="8.75" class="bg"/>
  <rect x=".25" y=".25" width="65.5" height="17.5" rx="8.75" class="bd"/>
  <circle cx="9" cy="9" r="2.8" class="dot"/>
  <circle cx="9" cy="9" r="2.8" class="ring"/>
  <text x="16" y="13" class="lb">Building</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="52" height="22" viewBox="0 0 52 22">
  <defs>
    <style>
      .bg { fill: #173404; }
      .border { fill: none; stroke: #3B6D11; stroke-width: 0.5; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 500; fill: #C0DD97; }
      .dot { fill: #97C459; }
      .ring { fill: none; stroke: #97C459; stroke-width: 1.5; animation: expand 1.8s ease-out infinite; }
      @keyframes expand {
        0% { r: 3.5px; opacity: 0.6; }
        100% { r: 7px; opacity: 0; }
      }
    </style>
  </defs>
  <rect x="0.25" y="0.25" width="51.5" height="21.5" rx="10.75" class="bg"/>
  <rect x="0.25" y="0.25" width="51.5" height="21.5" rx="10.75" class="border"/>
  <circle cx="11" cy="11" r="3.5" class="dot"/>
  <circle cx="11" cy="11" r="3.5" class="ring"/>
  <text x="19" y="15" class="label">Live</text>
</svg>

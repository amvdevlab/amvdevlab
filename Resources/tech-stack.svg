<svg viewBox="0 0 3600 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .marquee { animation: scroll 50s linear infinite; }
    
    .text-item { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      font-size: 32px; 
      font-weight: 500;
      fill: #1a1a1a;
      text-anchor: middle; /* This ensures the gap is measured from center to center */
    }

    @keyframes scroll { 
      0% { transform: translateX(0); } 
      100% { transform: translateX(-3600px); } 
    }
    
    svg:hover .marquee { animation-play-state: paused; }
  </style>


<svg xmlns="http://www.w3.org/2000/svg" width="44" height="18" viewBox="0 0 44 18">
  <defs><style>
    .bg{fill:#EAF3DE}.bd{fill:none;stroke:#639922;stroke-width:0.5}.lb{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:10px;font-weight:500;fill:#27500A}
    .dot{fill:#639922}.ring{fill:none;stroke:#639922;stroke-width:1.2;animation:ex 1.8s ease-out infinite}
    @keyframes ex{0%{r:2.8px;opacity:.6}100%{r:6px;opacity:0}}
  </style></defs>
  <rect x=".25" y=".25" width="43.5" height="17.5" rx="8.75" class="bg"/>
  <rect x=".25" y=".25" width="43.5" height="17.5" rx="8.75" class="bd"/>
  <circle cx="9" cy="9" r="2.8" class="dot"/>
  <circle cx="9" cy="9" r="2.8" class="ring"/>
  <text x="16" y="13" class="lb">Live</text>
</svg>
